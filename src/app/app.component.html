<div class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-slate-600 bg-slate-800 sticky top-0 z-50 shadow-lg">
    <div class="mx-auto max-w-7xl px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-8">
          <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-slate-300">Store Admin</p>
            <h1 class="text-xl font-semibold tracking-tight text-white">{{ title }}</h1>
          </div>

          <!-- Navigation Menu -->
          <nav class="hidden md:flex items-center space-x-8">
            <a routerLink="/home" 
               routerLinkActive="text-blue-300 border-blue-300" 
               [routerLinkActiveOptions]="{ exact: true }"
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">home</span>
              Dashboard
            </a>
            <a routerLink="/customers" 
               routerLinkActive="text-blue-300 border-blue-300" 
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">people</span>
              Customers
            </a>
            <a routerLink="/products" 
               routerLinkActive="text-blue-300 border-blue-300" 
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">inventory</span>
              Products
            </a>
            <a routerLink="/sales" 
               routerLinkActive="text-blue-300 border-blue-300" 
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">point_of_sale</span>
              Sales
            </a>
            <a routerLink="/purchases" 
               routerLinkActive="text-blue-300 border-blue-300" 
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">shopping_cart</span>
              Purchases
            </a>
            <a routerLink="/inventory" 
               routerLinkActive="text-blue-300 border-blue-300" 
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">warehouse</span>
              Inventory
            </a>
            <a routerLink="/reports" 
               routerLinkActive="text-blue-300 border-blue-300" 
               class="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white border-b-2 border-transparent transition-colors">
              <span class="material-icons text-sm">assessment</span>
              Reports
            </a>
          </nav>
        </div>

        <div class="flex items-center gap-4">
          <!-- Mobile menu button -->
          <button class="md:hidden p-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-700">
            <span class="material-icons">menu</span>
          </button>
          
          <!-- Status indicator -->
          <div class="hidden sm:flex items-center gap-2 rounded-full border border-slate-600 bg-slate-700 px-3 py-2 text-sm text-slate-300">
            <span class="material-icons text-green-400" style="font-size: 18px;">cloud</span>
            REST API enabled
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Router Outlet for page content -->
  <router-outlet></router-outlet>
  
  <!-- Toast Container for global notifications -->
  <app-toast-container></app-toast-container>
</div>
